[project]
name = "team-memory-server"
version = "0.1.0"
description = "MCP 服务：团队共享记忆与决策记录，基于 SQLite 持久化存储"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "fastmcp>=2.0",
    "mcp>=1.0",
    "aiosqlite>=0.20",
    "pydantic>=2.10",
]

[project.scripts]
team-memory-server = "team_memory_server.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/team_memory_server"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.mypy]
python_version = "3.11"
strict = true
